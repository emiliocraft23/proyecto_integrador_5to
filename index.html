<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Piterest proyecto</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <!-- header principal con busqueda y categorias -->
    <header class="header">

        <div class="logo">
            <h1>Piterest proyecto</h1>
        </div>

        <div class="buscador">
            <input type="text" id="busqueda" placeholder="Buscar imágenes, ideas...">

        <div class="nav">
            <a href="login.html">Iniciar sesión</a>
            <a href="register.html">Registrarse</a>

    <script>

        // funcion para ir al detalle de la publicacion
        function irADetalle() {
            window.location.href = "detalle.html";
        }

        // filtrado por categorias (basico por ahora)
        const botonesCategoria = document.querySelectorAll('.categoria-btn');
        
        botonesCategoria.forEach(boton => {
            boton.addEventListener('click', function() {
                // aqui se implementaria la logica de filtrado
                console.log('Categoria seleccionada:', this.textContent);
            });
        });
