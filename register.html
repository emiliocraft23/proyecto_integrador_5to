<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="register.css">
</head>

<body>
<!-- el registro el usuario xd -->
    <div class="contenedor">

        <div class="registro-box">

            <h1>Crear Cuenta</h1>
            <p>Únete y comparte tus ideas</p>

            <form>

                <div class="campo">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Ingresa tu nombre" required>
                </div>

                <div class="campo">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" placeholder="Ingresa tu apellido" required>
                </div>

                <div class="campo">
                    <label for="username">Nombre de usuario</label>
                    <input type="text" id="username" placeholder="ingresa tu nombre de usuario" required>
                </div>

                <div class="campo">
                    <label>Sexo</label>

                    <div class="radio-group">
                        <label>
                            <input type="radio" name="sexo" value="hombre" required>
                            Hombre
                        </label>

                        <label>
                            <input type="radio" name="sexo" value="mujer">
                            Mujer
                        </label>
                        <label>
                            <input type="radio" name="sexo" value="otro">
                            Otro
                        </label>
                    </div>
                </div>

                <div class="campo">
                    <label for="fechaNacimiento">Fecha de nacimiento</label>
                    <input type="date" id="fechaNacimiento" required>
                </div>

                <div class="campo">
                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" placeholder="ejemplo@gmail.com" required>
                </div>

                <div class="campo">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                </div>

                <div class="campo">
                    <label for="confirmar">Confirmar contraseña</label>
                    <input type="password" id="confirmar" placeholder="Confirma tu contraseña" required>
                </div>
                <button type="submit">Registrarse</button>

            </form>

            <div class="login-link">
                <p>¿Ya tienes una cuenta? <a href="login.html">Inicia sesión</a></p>
            </div>

        </div>

    </div>

</body>

</html>
